openapi: 3.0.3
info:
  title: MyCal API
  description: >
    Calendar API with event management and iCalendar support.
    All endpoints are under `/api/v1`. Datetimes use RFC 3339 format
    (or `YYYY-MM-DD` for all-day events). Errors return `{"error": "message"}`.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server
paths:
  /api/v1/preferences:
    get:
      summary: Get all preferences
      description: >
        Returns all preferences with their current values (defaults filled in for unset keys).
        Currently no server-side preferences are defined; the default event color is managed per-calendar via the calendars table.
      responses:
        "200":
          description: Current preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preferences"
        default:
          $ref: "#/components/responses/Error"
    patch:
      summary: Update preferences
      description: >
        Partial update — only included keys are changed. Omitted keys are left unchanged. Unknown keys return 400. Returns the full preferences state after update.

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Preferences"
      responses:
        "200":
          description: Full preferences after update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preferences"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/calendars:
    get:
      summary: List all calendars
      description: Returns all calendars. The default calendar (id=0) always exists. New calendars are auto-created when importing events or creating feed subscriptions with a calendar_name.
      responses:
        "200":
          description: List of calendars
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Calendar"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/calendars/{id}:
    patch:
      summary: Update a calendar
      description: >
        Partial update — only included fields are changed. Updates the calendar's name and/or color.

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCalendarRequest"
      responses:
        "200":
          description: Updated calendar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Calendar"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/events:
    get:
      summary: List or search events
      description: |
        List events in a time range (requires `from` and `to`), or search events by text (requires `q`).

        ```bash
        # List events for a time range
        curl 'http://localhost:8080/api/v1/events?from=2026-02-01T00:00:00Z&to=2026-03-01T00:00:00Z'

        # Search events
        curl 'http://localhost:8080/api/v1/events?q=meeting'

        # Filter by calendar ID
        curl 'http://localhost:8080/api/v1/events?from=2026-02-01T00:00:00Z&to=2026-03-01T00:00:00Z&calendar_id=1'

        # Filter by multiple calendars
        curl 'http://localhost:8080/api/v1/events?from=2026-02-01T00:00:00Z&to=2026-03-01T00:00:00Z&calendar_id=1&calendar_id=2'
        ```

      parameters:
        - name: from
          in: query
          description: Start of time range (RFC 3339). Required when not searching.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: End of time range (RFC 3339). Required when not searching.
          schema:
            type: string
            format: date-time
        - name: q
          in: query
          description: Search query text. When provided, `from` and `to` are optional filters.
          schema:
            type: string
        - name: calendar_id
          in: query
          description: Filter by calendar ID. Can be repeated to include multiple calendars. When omitted, all events are returned.
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - name: calendar
          in: query
          description: Filter by calendar name (backward compatible). Can be repeated. When omitted, all events are returned.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
        default:
          $ref: "#/components/responses/Error"
    post:
      summary: Create an event
      description: |
        ```bash
        # Create a timed event
        curl -X POST http://localhost:8080/api/v1/events \
          -H 'Content-Type: application/json' \
          -d '{
            "title": "Team Meeting",
            "all_day": false,
            "start_time": "2026-02-17T14:00:00Z",
            "end_time": "2026-02-17T15:00:00Z",
            "color": "dodgerblue"
          }'

        # Create an all-day event
        curl -X POST http://localhost:8080/api/v1/events \
          -H 'Content-Type: application/json' \
          -d '{
            "title": "Holiday",
            "all_day": true,
            "start_date": "2026-06-06",
            "end_date": "2026-06-07",
            "color": "green"
          }'
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventRequest"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/events/{id}:
    get:
      summary: Get a single event
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: The event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        default:
          $ref: "#/components/responses/Error"
    patch:
      summary: Update an event
      description: >
        Partial update — only included fields are changed. Use a composite ID (e.g. `42_2026-03-09T09:00:00Z`) to create or update a single recurrence instance override.

      parameters:
        - $ref: "#/components/parameters/EventId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventRequest"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        default:
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete an event
      description: >
        Deletes an event and all its overrides. Use a composite ID (e.g. `42_2026-03-09T09:00:00Z`) to exclude a single recurrence instance instead.

      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "204":
          description: Event deleted (simple ID)
        "200":
          description: Recurrence instance excluded (composite ID)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/events/{id}/ics:
    get:
      summary: Export a single event as iCalendar
      description: >
        Returns the event as an iCalendar document suitable for use as an email attachment.
        Supports the same composite ID format as the other event endpoints.
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: iCalendar data for the event
          content:
            text/calendar:
              schema:
                type: string
        default:
          $ref: "#/components/responses/Error"
  /api/v1/import:
    post:
      summary: Import events from iCalendar data
      description: |
        Accepts iCalendar data in two ways:

        **Direct iCalendar content** — send the raw `.ics` data as the request body with `Content-Type: text/calendar`:

        ```bash
        curl -X POST http://localhost:8080/api/v1/import \
          -H 'Content-Type: text/calendar' \
          --data-binary @events.ics
        ```

        **URL import** — send a JSON body with `Content-Type: application/json`:

        ```bash
        curl -X POST http://localhost:8080/api/v1/import \
          -H 'Content-Type: application/json' \
          -d '{"url": "https://example.com/calendar.ics"}'
        ```
      parameters:
        - name: calendar
          in: query
          description: Calendar name to assign to imported events. Defaults to empty string.
          schema:
            type: string
            maxLength: 100
      requestBody:
        required: true
        content:
          text/calendar:
            schema:
              type: string
              format: binary
              description: Raw iCalendar (.ics) data
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  description: URL to fetch iCalendar data from
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: integer
                    description: Number of events imported
        default:
          $ref: "#/components/responses/Error"
  /api/v1/import-single:
    post:
      summary: Import a single event from iCalendar data
      description: >
        Accepts iCalendar data either as raw `text/calendar` body or as a JSON body with a URL to fetch. The iCalendar data must contain exactly one event.

      parameters:
        - name: calendar
          in: query
          description: Calendar name to assign to the imported event. Defaults to empty string.
          schema:
            type: string
            maxLength: 100
      requestBody:
        required: true
        content:
          text/calendar:
            schema:
              type: string
              format: binary
              description: Raw iCalendar (.ics) data with a single event
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  description: URL to fetch iCalendar data from
      responses:
        "201":
          description: Event imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/feeds:
    get:
      summary: List feed subscriptions
      responses:
        "200":
          description: List of feeds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Feed"
        default:
          $ref: "#/components/responses/Error"
    post:
      summary: Create a feed subscription
      description: |
        Creates a feed subscription that periodically re-imports events from an ICS URL.
        Events with the same ICS UID are deduplicated automatically.

        ```bash
        curl -X POST http://localhost:8080/api/v1/feeds \
          -H 'Content-Type: application/json' \
          -d '{
            "url": "https://example.com/calendar.ics",
            "calendar_name": "work",
            "refresh_interval_minutes": 60
          }'
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeedRequest"
      responses:
        "201":
          description: Feed created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feed"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/feeds/{id}:
    get:
      summary: Get a feed subscription
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: The feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feed"
        default:
          $ref: "#/components/responses/Error"
    put:
      summary: Update a feed subscription
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFeedRequest"
      responses:
        "200":
          description: Updated feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feed"
        default:
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete a feed subscription
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Feed deleted
        default:
          $ref: "#/components/responses/Error"
  /api/v1/feeds/{id}/refresh:
    post:
      summary: Manually refresh a feed
      description: >
        Triggers an immediate refresh of the feed, regardless of the scheduled interval.
        Returns the feed after refresh with updated `last_refreshed_at` and `last_error`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Feed after refresh (includes updated last_refreshed_at and last_error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feed"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/events.ics:
    get:
      summary: iCalendar feed
      description: >
        Returns all events as an iCalendar feed. Optionally filter by calendar name or ID.
        Subscribe from any app that supports iCalendar (Google Calendar, Apple Calendar, Thunderbird, etc.)
        using `http://your-server/api/v1/events.ics`.
      parameters:
        - name: calendar_id
          in: query
          description: Filter by calendar ID. Can be repeated.
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - name: calendar
          in: query
          description: Filter by calendar name (backward compatible). Can be repeated.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        "200":
          description: iCalendar data
          content:
            text/calendar:
              schema:
                type: string
        default:
          $ref: "#/components/responses/Error"
  /calendar.ics:
    get:
      summary: iCalendar feed (convenience URL)
      description: >
        Same as `/api/v1/events.ics`. Convenience URL for subscribing from calendar apps
        at `http://your-server/calendar.ics`.
      parameters:
        - name: calendar_id
          in: query
          description: Filter by calendar ID. Can be repeated.
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - name: calendar
          in: query
          description: Filter by calendar name (backward compatible). Can be repeated.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        "200":
          description: iCalendar data
          content:
            text/calendar:
              schema:
                type: string
        default:
          $ref: "#/components/responses/Error"
components:
  parameters:
    EventId:
      name: id
      in: path
      required: true
      description: >
        Event ID. Simple events use a numeric string (e.g. "42"). Recurring instances use a composite format: "parentID_instanceStartTime" (e.g. "42_2026-03-09T09:00:00Z"). Must be URL-encoded in the path.

      schema:
        type: string
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Preferences:
      type: object
      description: >
        User preferences. Currently no server-side preferences are defined; the default event color is managed per-calendar via the calendars table.

      additionalProperties:
        type: string
    Calendar:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        name:
          type: string
        color:
          type: string
          description: CSS color for events in this calendar
      required:
        - id
        - name
        - color
    UpdateCalendarRequest:
      type: object
      description: All fields are optional. Only included fields are changed.
      properties:
        name:
          type: string
          maxLength: 100
        color:
          type: string
          description: CSS color for events in this calendar
    Feed:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        url:
          type: string
          format: uri
          maxLength: 2000
        calendar_id:
          type: integer
          format: int64
          readOnly: true
          description: Calendar ID for imported events
        calendar_name:
          type: string
          readOnly: true
          description: Calendar name (derived from calendar_id, read-only)
        refresh_interval_minutes:
          type: integer
          minimum: 5
          maximum: 10080
          default: 60
        last_refreshed_at:
          type: string
          format: date-time
          readOnly: true
        last_error:
          type: string
          readOnly: true
        enabled:
          type: boolean
          default: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
        - id
        - url
    CreateFeedRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          maxLength: 2000
        calendar_name:
          type: string
          maxLength: 100
        calendar_color:
          type: string
          description: CSS color for the new calendar (only used when calendar_name creates a new calendar)
        refresh_interval_minutes:
          type: integer
          minimum: 5
          maximum: 10080
          default: 60
    UpdateFeedRequest:
      type: object
      description: All fields are optional. Only included fields are changed.
      properties:
        url:
          type: string
          format: uri
          maxLength: 2000
        calendar_name:
          type: string
          maxLength: 100
        refresh_interval_minutes:
          type: integer
          minimum: 5
          maximum: 10080
        enabled:
          type: boolean
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Event:
      type: object
      properties:
        id:
          type: string
          readOnly: true
          description: Unique event ID (opaque). Must be URL-encoded in paths.
        parent_id:
          type: string
          readOnly: true
          description: >
            Parent event ID for recurrence instances. Present only on expanded or overridden recurring instances; absent for regular events.
        title:
          type: string
          maxLength: 500
        description:
          type: string
          maxLength: 10000
        start_date:
          type: string
          format: date
          description: Start date (YYYY-MM-DD). Set for all-day events; mutually exclusive with start_time.
        end_date:
          type: string
          format: date
          description: Exclusive end date (YYYY-MM-DD). Set for all-day events; mutually exclusive with end_time.
        start_time:
          type: string
          format: date-time
          description: Start datetime (RFC 3339). Set for timed events; mutually exclusive with start_date.
        end_time:
          type: string
          format: date-time
          description: End datetime (RFC 3339). Set for timed events; mutually exclusive with end_date.
        all_day:
          type: boolean
        color:
          type: string
          description: CSS3 color name per RFC 7986 (e.g. dodgerblue, red, gold)
        recurrence_freq:
          type: string
          enum: ["", DAILY, WEEKLY, MONTHLY, YEARLY]
        recurrence_count:
          type: integer
          minimum: 0
          maximum: 1000
        recurrence_until:
          type: string
          format: date-time
        recurrence_interval:
          type: integer
          description: Repeat every N periods (0 or 1 = every, 2 = every other, etc.)
        recurrence_by_day:
          type: string
          description: 'Comma-separated days, e.g. "MO,WE,FR" or "2MO,-1FR"'
        recurrence_by_monthday:
          type: string
          description: 'Comma-separated month days, e.g. "15,30" or "-1"'
        recurrence_by_month:
          type: string
          description: 'Comma-separated months (1-12), e.g. "1,6"'
        exdates:
          type: string
          description: Comma-separated RFC 3339 timestamps of excluded recurrence instances
        rdates:
          type: string
          description: Comma-separated RFC 3339 timestamps of additional recurrence dates
        recurrence_parent_id:
          type: integer
          format: int64
          readOnly: true
          nullable: true
          description: Parent event ID for instance overrides
        recurrence_original_start:
          type: string
          format: date-time
          readOnly: true
          description: Original start time of overridden instance
        duration:
          type: string
          description: 'ISO 8601 duration (e.g. PT1H, PT30M, P1D)'
        categories:
          type: string
          maxLength: 500
          description: Comma-separated category tags
        url:
          type: string
          format: uri
          maxLength: 2000
          description: Reference URL (must start with http:// or https://)
        reminder_minutes:
          type: integer
          minimum: 0
          maximum: 40320
        location:
          type: string
          maxLength: 500
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
          nullable: true
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
          nullable: true
        calendar_id:
          type: integer
          format: int64
          readOnly: true
          description: Calendar ID (set via import, read-only via create/update API)
        calendar_name:
          type: string
          readOnly: true
          description: Calendar name (derived from calendar_id, read-only)
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
        - id
        - title
    CreateEventRequest:
      type: object
      required:
        - title
        - all_day
      properties:
        title:
          type: string
          maxLength: 500
        description:
          type: string
          maxLength: 10000
        start_date:
          type: string
          format: date
          description: Start date (YYYY-MM-DD). Required when all_day is true; mutually exclusive with start_time.
        end_date:
          type: string
          format: date
          description: Exclusive end date (YYYY-MM-DD). Required when all_day is true; mutually exclusive with end_time.
        start_time:
          type: string
          format: date-time
          description: Start datetime (RFC 3339). Required when all_day is false; mutually exclusive with start_date.
        end_time:
          type: string
          format: date-time
          description: End datetime (RFC 3339). Required when all_day is false, unless duration is provided; mutually exclusive with end_date.
        all_day:
          type: boolean
          default: false
        color:
          type: string
        recurrence_freq:
          type: string
          enum: ["", DAILY, WEEKLY, MONTHLY, YEARLY]
        recurrence_count:
          type: integer
          minimum: 0
          maximum: 1000
        recurrence_until:
          type: string
        recurrence_interval:
          type: integer
        recurrence_by_day:
          type: string
        recurrence_by_monthday:
          type: string
        recurrence_by_month:
          type: string
        exdates:
          type: string
        rdates:
          type: string
        duration:
          type: string
          description: 'ISO 8601 duration (e.g. PT1H, PT30M, P1D). Alternative to end_time.'
        categories:
          type: string
          maxLength: 500
        url:
          type: string
          format: uri
          maxLength: 2000
        reminder_minutes:
          type: integer
          minimum: 0
          maximum: 40320
        location:
          type: string
          maxLength: 500
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
          nullable: true
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
          nullable: true
    UpdateEventRequest:
      type: object
      description: All fields are optional. Only included fields are changed.
      properties:
        title:
          type: string
          maxLength: 500
        description:
          type: string
          maxLength: 10000
        start_date:
          type: string
          format: date
          description: Start date (YYYY-MM-DD). For all-day events; mutually exclusive with start_time.
        end_date:
          type: string
          format: date
          description: Exclusive end date (YYYY-MM-DD). For all-day events; mutually exclusive with end_time.
        start_time:
          type: string
          format: date-time
          description: Start datetime (RFC 3339). For timed events; mutually exclusive with start_date.
        end_time:
          type: string
          format: date-time
          description: End datetime (RFC 3339). For timed events; mutually exclusive with end_date.
        all_day:
          type: boolean
        color:
          type: string
        recurrence_freq:
          type: string
          enum: ["", DAILY, WEEKLY, MONTHLY, YEARLY]
        recurrence_count:
          type: integer
          minimum: 0
          maximum: 1000
        recurrence_until:
          type: string
        recurrence_interval:
          type: integer
        recurrence_by_day:
          type: string
        recurrence_by_monthday:
          type: string
